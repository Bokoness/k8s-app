# templates/secret.yaml
# Stores sensitive values - DB password in this case.
# K8s Secrets are base64-encoded (NOT encrypted by default).
# The real security comes from RBAC - you can restrict who can read Secrets
# separately from ConfigMaps.
#
# In production:
#   - Never hardcode passwords in values.yaml
#   - Pass them at deploy time: helm upgrade k8s-app . --set postgres.password=supersecret
#   - Or use external secret managers (AWS Secrets Manager, Vault, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    {{- include "k8s-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  # stringData accepts plain text - K8s automatically base64-encodes it.
  # This is simpler than using data: which requires you to base64-encode manually.
  DB_PASSWORD: {{ .Values.postgres.password | quote }}
