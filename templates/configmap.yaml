# templates/configmap.yaml
# Stores non-sensitive app config as environment variables.
# Sensitive values (DB_PASSWORD) have been moved to secret.yaml.

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  PORT: "{{ .Values.config.port }}"
  NODE_ENV: "{{ .Values.config.nodeEnv }}"
  DB_HOST: "{{ .Release.Name }}-postgres"
  DB_PORT: "{{ .Values.config.dbPort }}"
  DB_NAME: "{{ .Values.config.dbName }}"
  DB_USER: "{{ .Values.config.dbUser }}"
