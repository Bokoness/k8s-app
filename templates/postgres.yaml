# templates/postgres.yaml
# PostgreSQL database deployment.
# Uses the official postgres:15 Docker Hub image.
# PVC provides persistent storage so data survives pod restarts.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres
  labels:
    app: {{ .Release.Name }}-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-postgres
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          # IfNotPresent = use local image if available, otherwise pull
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            # These env vars are read by the official postgres image on first startup
            # to create the database, user, and password automatically
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            # References the PVC defined below in this same file
            claimName: {{ .Release.Name }}-postgres-pvc
---
# Service for PostgreSQL - gives the app a stable DNS name to connect to.
# Inside the cluster: k8s-app-postgres.default.svc.cluster.local
# Or just: k8s-app-postgres (short form works within same namespace)
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  selector:
    app: {{ .Release.Name }}-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
# PersistentVolumeClaim - requests 1Gi of storage for the database.
# Minikube automatically provisions this from its standard storage class.
# Data persists across pod restarts as long as the PVC exists.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
