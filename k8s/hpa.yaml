apiVersion: autoscaling/v2      # v2 supports multiple metric types (CPU, memory, custom)
kind: HorizontalPodAutoscaler
metadata:
  name: k8s-app-hpa
  namespace: prod
spec:

  # Which deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k8s-app             # must match your Deployment name exactly

  minReplicas: 2               # never scale below 2 — keeps the app available
                               # even at zero traffic (1 pod = single point of failure)
  maxReplicas: 6               # never scale above 6 — acts as a cost/resource cap

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  