apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-app
  namespace: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-app
  # pod's template
  template:
    metadata:
      labels:
        app: k8s-app # must match selector.matchLabels above
    # spec of the pods
    spec:
      containers:
        - name: k8s-app
          image: k8s-app:v1
          imagePullPolicy: Never # use locally loaded image (minikube dev workflow)
          ports:
            - containerPort: 3000 # the port the app inside the container listens on
          resources:
            requests:
              cpu: "100m"     # guaranteed 0.1 CPU core
              memory: "128Mi" # guaranteed 128 MiB RAM
            limits:
              cpu: "250m"     # throttled if it exceeds 0.25 core
              memory: "256Mi" # OOM-killed if it exceeds 256 MiB
          env:
            # ── From ConfigMap (plain text, safe to commit) ──
            - name: VERSION
              valueFrom:
                configMapKeyRef:
                  name: k8s-app-config
                  key: VERSION
            - name: ENV_NAME
              valueFrom:
                configMapKeyRef:
                  name: k8s-app-config
                  key: ENV_NAME
            # ── From Secret (base64-encoded, kept out of source code) ──
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: k8s-app-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k8s-app-secret
                  key: DB_PASSWORD