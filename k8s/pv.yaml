# A PersistentVolume (PV) represents a piece of storage in the cluster.
# It is provisioned by an admin and exists independently of any Pod —
# data survives even if the Pod is deleted or restarted.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv  # The name used to identify this PV inside the cluster
spec:
  capacity:
    storage: 1Gi  # How much storage this PV offers
  accessModes:
    - ReadWriteOnce  # This volume can be mounted read-write by exactly ONE node at a time
  hostPath:
    path: "/mnt/data/postgres"  # Stores data directly on the host node's filesystem.
                                 # Easy for local dev — NOT suitable for production clusters.

---
# A PersistentVolumeClaim (PVC) is a Pod's request for storage.
# Kubernetes finds a PV that matches the requirements (size, access mode)
# and "binds" the two together. The Pod then uses the PVC, not the PV directly.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc  # The name Pods will reference when they want to use this storage
  namespace: prod
spec:
  accessModes:
    - ReadWriteOnce  # Must match (or be a subset of) the PV's access modes for binding
  resources:
    requests:
      storage: 1Gi  # Must be <= the PV capacity above for this PVC to bind to it

---
# A Deployment describes the desired state for a set of identical Pods.
# Kubernetes continuously reconciles actual state toward this desired state —
# if a Pod crashes, the Deployment controller automatically creates a new one.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: prod
spec:
  replicas: 1  # Keep exactly 1 Pod running at all times (suitable for a single DB instance)
  selector:
    matchLabels:
      app: postgres  # The Deployment "owns" and manages Pods that carry this label
  template:
    metadata:
      labels:
        app: postgres  # Every Pod created by this Deployment gets this label
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine  # The official Postgres 15 image (alpine = lightweight Linux base)
          ports:
            - containerPort: 5432  # The port Postgres listens on inside the container
          env:
            # Instead of hardcoding credentials, we pull them from a Secret object.
            # This keeps sensitive values out of source control.
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: k8s-app-secret  # The name of the Secret object to read from
                  key: DB_NAME          # The key inside that Secret that holds the database name
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: k8s-app-secret
                  key: DB_USER          # The key holding the database username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k8s-app-secret
                  key: DB_PASSWORD      # The key holding the database password
          volumeMounts:
            - name: postgres-storage    # References the volume name defined in "volumes" below
              mountPath: /var/lib/postgresql/data  # Where Postgres stores its data files inside the container
      volumes:  # List of volumes available to containers in this Pod
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc  # Ties this volume to the PVC above, which in turn binds to the PV

---
# A Service gives a stable network identity to a dynamic set of Pods.
# Pods are ephemeral — they come and go and get new IPs each time.
# A Service provides a consistent DNS name and IP that always routes to healthy Pods.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: prod
spec:
  selector:
    app: postgres  # Routes traffic to any Pod with this label (our Postgres Pod)
  ports:
    - port: 5432        # The port THIS Service listens on (what other services connect to)
      targetPort: 5432  # The port on the Pod to forward that traffic to
  type: ClusterIP  # ClusterIP = reachable only within the cluster.
                   # Use NodePort to expose on the host, or LoadBalancer for a cloud load balancer.  